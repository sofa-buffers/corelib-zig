name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token plus the scopes the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deploy at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Zig autodoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Zig's built-in documentation generator (autodoc) over the `sofab` module.
      - name: Build documentation
        run: zig build docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: zig-out/docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
