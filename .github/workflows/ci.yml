name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  ZIG_VERSION: 0.16.0

jobs:
  # Formatting, denying any unformatted file.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig fmt --check build.zig src tests bench

  # Build + full test suite (incl. the shared vectors from assets/) in both
  # optimize modes: Debug keeps all safety checks; ReleaseFast is the shipping
  # config this port is tuned for.
  #
  # Zig has a single upstream toolchain and `build.zig.zon` declares
  # `minimum_zig_version = 0.16.0`, so there is no older-stable leg to test
  # against — pre-0.16 compilers are rejected by the package manager, not
  # merely untested. The matrix is therefore "the pinned stable we ship
  # against" plus a non-blocking `master` leg that gives early warning when a
  # 0.17-dev change breaks us, without turning upstream churn into a red PR.
  test:
    name: Test (zig ${{ matrix.zig }}, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    # `master` moves under us; its failures are informational only.
    continue-on-error: ${{ matrix.zig == 'master' }}
    strategy:
      fail-fast: false
      matrix:
        mode: [debug, release]
        zig: [0.16.0, master]
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
      - name: Build
        run: zig build ${{ matrix.mode == 'release' && '--release=fast' || '' }}
      - name: Test
        run: zig build test ${{ matrix.mode == 'release' && '--release=fast' || '' }}
      - name: Smoke-run the benchmark tools
        if: matrix.mode == 'release'
        run: |
          zig build perf
          zig build bench

  # Same suite on a big-endian host (IBM Z / s390x) under QEMU, proving the
  # little-endian wire format round-trips correctly off little-endian hardware.
  test-big-endian:
    name: Test (s390x big-endian)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install QEMU user emulation
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          # Zig invokes the interpreter as `qemu-s390x`; Ubuntu ships it as
          # `qemu-s390x-static`.
          sudo ln -sf /usr/bin/qemu-s390x-static /usr/local/bin/qemu-s390x
      - run: zig build test -Dtarget=s390x-linux -fqemu

  # Same suite on a 32-bit target, pinning down the places where the port would
  # otherwise silently assume a 64-bit `usize`: length/offset arithmetic, varint
  # decode into `usize`, and any capacity bound that only overflows when
  # `usize` is 32 bits wide. x86-linux binaries execute directly on the 64-bit
  # runner (freestanding static Zig binaries need no 32-bit userland), so this
  # leg needs no QEMU and runs at full speed. Both optimize modes are covered:
  # Debug catches the overflow via safety checks, ReleaseFast proves the
  # shipping config still round-trips.
  test-32bit:
    name: Test (x86 32-bit, ${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [debug, release]
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig build test -Dtarget=x86-linux ${{ matrix.mode == 'release' && '--release=fast' || '' }}

  # Line coverage via kcov over the test binaries; publishes the README's
  # coverage badge from main.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the badge JSON to the `badges` branch
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      # kcov is not packaged for Ubuntu 24.04 — build the pinned release.
      - name: Build kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ binutils-dev libdw-dev libiberty-dev \
            libcurl4-openssl-dev zlib1g-dev libssl-dev jq
          curl -fsSL https://github.com/SimonKagstrom/kcov/archive/refs/tags/v43.tar.gz | tar xz -C /tmp
          cmake -S /tmp/kcov-43 -B /tmp/kcov-43/build -DCMAKE_BUILD_TYPE=Release
          make -C /tmp/kcov-43/build -j"$(nproc)"
          sudo make -C /tmp/kcov-43/build install

      - name: Measure coverage
        run: |
          ./coverage.sh
          PCT=$(jq -r '.percent_covered' "$(find coverage/merged -name coverage.json | head -1)")
          echo "COVERAGE_PCT=$PCT" >> "$GITHUB_ENV"

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/publish-coverage-badge.sh
